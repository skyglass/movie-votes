apiVersion: v1
kind: PersistentVolume
metadata:
  name: movievotes-postgres-pv
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  awsElasticBlockStore:
    volumeID: $MOVIEVOTES_POSTGRES_VOLUME_ID
    fsType: ext4

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movievotes-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 20Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: movievotes-postgres
spec:
  serviceName: movievotes-postgres
  replicas: 1
  selector:
    matchLabels:
      app: movievotes-postgres
  template:
    metadata:
      labels:
        app: movievotes-postgres
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - eu-central-1a
      imagePullSecrets:
        - name: image-pull-secret
      initContainers:
        - name: format-and-resize-filesystem
          image: alpine
          command:
            - sh
            - -c
            - |
              apk add --no-cache e2fsprogs && \
              # Check if /var/lib/postgresql/data is already formatted
              if ! blkid /var/lib/postgresql/data >/dev/null 2>&1; then
                echo "Filesystem not found, formatting..."
                mkfs.ext4 /var/lib/postgresql/data || echo "Formatting failed"
              else
                echo "Filesystem exists, skipping format"
              fi && \
              resize2fs /var/lib/postgresql/data || echo "Resize failed or not needed"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      containers:
        - env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: dbpass
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: PGTZ
              value: "Europe/Amsterdam"
            - name: VOTE_DB_USER
              value: "votedbuser"
            - name: VOTE_DB_PASSWORD
              value: "dbpass"
            - name: VOTE_DB_NAME
              value: "votedb"
            - name: CUSTOMER_DB_USER
              value: "customerdbuser"
            - name: CUSTOMER_DB_PASSWORD
              value: "dbpass"
            - name: CUSTOMER_DB_NAME
              value: "customerdb"
          image: $CONTAINER_REGISTRY/movievotes-postgres:$VERSION
          name: movievotes-postgres
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data  # Default data path for PostgreSQL
          resources: {}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: movievotes-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: movievotes-postgres
spec:
  selector:
    app: movievotes-postgres
  ports:
    - name: "5432"
      port: 5432
      targetPort: 5432
  type: LoadBalancer