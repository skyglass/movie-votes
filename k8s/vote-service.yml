apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  labels:
    app: vote
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vote
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: vote
    spec:
      imagePullSecrets:
      - name: image-pull-secret
      containers:
      - name: vote
        image: $CONTAINER_REGISTRY/vote-service:$VERSION
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9005
        - containerPort: 8005
        env:
        - name: SERVER_PORT
          value: "9005"
        - name: BPL_JVM_THREAD_COUNT
          value: "50"
        - name: BPL_DEBUG_ENABLED
          value: "true"
        - name: BPL_DEBUG_PORT
          value: "8005"
        - name: SPRING_KEYCLOAK_SERVER_URL
          value: "http://movievotes-keycloak:8080/keycloak"
        - name: SPRING_KEYCLOAK_SERVER_EXTERNAL_URL
          valueFrom:
            configMapKeyRef:
              name: base-url-config
              key: KEYCLOAK_BASE_URL
        - name: INSTANCE_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep 5"]

---
apiVersion: v1
kind: Service
metadata:
  name: vote
  labels:
    app: vote
spec:
  selector:
    app: vote
  ports:
  - name: prod
    port: 9005
    targetPort: 9005
  - name: debug
    port: 8005
    targetPort: 8005