apiVersion: v1
kind: PersistentVolume
metadata:
  name: movievotes-postgres-pv
spec:
  capacity:
    storage: 10Gi  # Adjust storage size as needed
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: manual  # Use manual storage class for explicit PV binding
  hostPath:
    path: "/mnt/data/postgresql"  # This path is on the host node

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movievotes-postgres-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: manual  # Match the manual storage class with the PV

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: movievotes-postgres
spec:
  serviceName: movievotes-postgres
  replicas: 1
  selector:
    matchLabels:
      app: movievotes-postgres
  template:
    metadata:
      labels:
        app: movievotes-postgres
    spec:
      containers:
        - env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: dbpass
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: PGTZ
              value: "Europe/Amsterdam"
            - name: VOTE_DB_USER
              value: "votedbuser"
            - name: VOTE_DB_PASSWORD
              value: "dbpass"
            - name: VOTE_DB_NAME
              value: "votedb"
            - name: CUSTOMER_DB_USER
              value: "customerdbuser"
            - name: CUSTOMER_DB_PASSWORD
              value: "dbpass"
            - name: CUSTOMER_DB_NAME
              value: "customerdb"
          image: $CONTAINER_REGISTRY/movievotes-postgres:$VERSION
          name: movievotes-postgres
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data  # Default data path for PostgreSQL
          resources: {}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: movievotes-postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: movievotes-postgres
spec:
  selector:
    app: movievotes-postgres
  ports:
    - name: "5432"
      port: 5432
      targetPort: 5432
  type: LoadBalancer